[build]
  command   = ""
  publish   = "."

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
